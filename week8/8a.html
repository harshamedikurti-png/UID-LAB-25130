<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rotating Square</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .square {
            width: 100px;
            height: 100px;
            background-color: #3498db;
            animation: rotateSquare 2s linear infinite;
        }

        @keyframes rotateSquare {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <p>rotating square</p>

    <div class="square"></div>

</body>
</html>
